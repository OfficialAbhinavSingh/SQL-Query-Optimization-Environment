  <style>

    * { box-sizing:border-box; }

    .pill { display:inline-block; padding:2px 8px; border-radius:999px; background:#1f3a5f; font-size:0.75rem; }
    h2 { font-size:0.95rem; margin:16px 0 8px; color:var(--acc); }
